workflows:
  android-workflow:
    name: VKard PRO Android Build
    max_build_duration: 60
    environment:
      groups:
        # Define these environment variables in your Codemagic application settings:
        # 1. supabase_credentials: SUPABASE_URL, SUPABASE_KEY
        # 2. keystore_credentials: CM_KEYSTORE (Base64 encoded keystore file), CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - supabase_credentials
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.vkard.pro"
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
    scripts:
      - name: Initialize local.properties and Play Store Keystore
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > local.properties
          echo "SUPABASE_KEY=$SUPABASE_KEY" >> local.properties
          if [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > release.keystore
            echo "RELEASE_STORE_FILE=../release.keystore" >> local.properties
            echo "RELEASE_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD" >> local.properties
            echo "RELEASE_KEY_ALIAS=$CM_KEY_ALIAS" >> local.properties
            echo "RELEASE_KEY_PASSWORD=$CM_KEY_PASSWORD" >> local.properties
            echo "Keystore decoded and release config appended successfully."
          else
            echo "No CM_KEYSTORE variable detected. Release build will be unsigned."
          fi
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
      - name: Build Release APK
        script: |
          ./gradlew assembleRelease
      - name: Build Release Bundle (AAB)
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - coachmuhsin@gmail.com # Default recipient for status updates
        notify:
          success: true
          failure: true
