name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Generate Properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
            echo "RELEASE_STORE_FILE=../release.keystore" >> local.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
            echo "HAS_SIGNING=true" >> $GITHUB_ENV
          else
            echo "HAS_SIGNING=false" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build App
        run: |
          ./gradlew assembleDebug --build-cache --parallel --no-daemon
          if [ "${{ env.HAS_SIGNING }}" = "true" ]; then
            ./gradlew assembleRelease bundleRelease --build-cache --parallel --no-daemon
          fi
        shell: bash

      - name: Package Outputs
        run: |
          mkdir -p build_outputs
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build_outputs/VKARD-PRO.apk
            cp app/build/outputs/bundle/release/app-release.aab build_outputs/VKARD-PRO.aab
            echo "IS_RELEASE_READY=true" >> $GITHUB_ENV
          else
            cp app/build/outputs/apk/debug/app-debug.apk build_outputs/VKARD-PRO.apk
            echo "IS_RELEASE_READY=false" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VKARD PRO Build
          files: build_outputs/*
          fail_on_unsupported_status: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/**/*.apk

      - name: Upload Release APK Artifact
        if: env.IS_RELEASE_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/**/*.apk

      - name: Upload Release AAB Artifact
        if: env.IS_RELEASE_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/**/*.aab

      - name: Clean Keystore
        if: always()
        run: rm -f release.keystore
        shell: bash

      - name: Print Output Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "Build Success"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v1.0.${{ github.run_number }}"
          echo "APK URL: https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/VKARD-PRO.apk"
          echo "Workflow Duration: ${MIN}m ${SEC}s"
        shell: bash
