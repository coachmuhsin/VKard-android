name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Calculate App Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, urllib.request, os
 
          latest_code = 0
          try:
              req = urllib.request.Request(
                  'https://api.github.com/repos/coachmuhsin/VKard-android/releases/latest',
                  headers={'User-Agent': 'Github-Actions-Build'}
              )
              token = os.environ.get('GITHUB_TOKEN')
              if token:
                  req.add_header('Authorization', f'token {token}')
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  latest_tag = data.get('tag_name', '')
                  # tag name can be v5 or just 5
                  if latest_tag.startswith('v'):
                      latest_code = int(latest_tag[1:].strip())
                  elif latest_tag.isdigit():
                      latest_code = int(latest_tag)
          except Exception as e:
              print(f'Error fetching latest release: {e}')
 
          new_version_code = latest_code + 1
          new_version_name = f'Release {new_version_code}'
 
          print(f'VERSION_NAME: {new_version_name}')
          print(f'VERSION_CODE: {new_version_code}')
 
          with open('version.properties', 'w') as prop_file:
              prop_file.write(f'versionCode={new_version_code}\n')
              prop_file.write(f'versionName={new_version_name}\n')
 
          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'VERSION_NAME={new_version_name}\n')
              env_file.write(f'VERSION_CODE={new_version_code}\n')
          "
        shell: bash

      - name: Generate Properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app

          echo "${{ secrets.SUPABASE_URL }}" > local.properties
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties

          if [ -z "$KEYSTORE_BASE64" ]; then
              echo "ERROR: KEYSTORE_BASE64 secret is empty."
              exit 1
          fi

          echo "KEYSTORE_BASE64 Length: ${#KEYSTORE_BASE64}"

          printf '%s' "$KEYSTORE_BASE64" \
          | tr -d '\r\n ' \
          | base64 -d > release.keystore || { echo "KEYSTORE_BASE64 is invalid or truncated."; exit 1; }

          if [ ! -f release.keystore ]; then
              echo "Keystore not created."
              exit 1
          fi

          if [ ! -s release.keystore ]; then
              echo "Keystore is empty."
              exit 1
          fi

          ls -lh release.keystore

          echo "RELEASE_STORE_FILE=../release.keystore" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
        shell: bash

      - name: Build App
        run: |
          ./gradlew clean --build-cache --parallel --no-daemon
          ./gradlew assembleRelease bundleRelease --build-cache --parallel --no-daemon
        shell: bash

      - name: Package Outputs
        run: |
          mkdir -p build_outputs
          cp app/build/outputs/apk/release/app-release.apk build_outputs/VKARD-PRO-v${{ env.VERSION_CODE }}.apk
          cp app/build/outputs/bundle/release/app-release.aab build_outputs/VKARD-PRO-v${{ env.VERSION_CODE }}.aab
          echo "IS_RELEASE_READY=true" >> $GITHUB_ENV
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_CODE }}
          name: VKARD PRO Release ${{ env.VERSION_CODE }}
          files: build_outputs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/**/*.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/**/*.aab

      - name: Clean Keystore
        if: always()
        run: rm -f release.keystore
        shell: bash

      - name: Print Output Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "Build Successful"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION_CODE }}"
          echo "APK URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION_CODE }}/VKARD-PRO-v${{ env.VERSION_CODE }}.apk"
          echo "AAB URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION_CODE }}/VKARD-PRO-v${{ env.VERSION_CODE }}.aab"
          echo "Workflow Duration: ${MIN}m ${SEC}s"
          echo "Permanent Download URL: https://github.com/${{ github.repository }}/releases/latest/download/VKARD-PRO-v${{ env.VERSION_CODE }}.apk"
        shell: bash
