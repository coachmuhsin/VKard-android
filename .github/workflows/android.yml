name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Generate local.properties and Keystore
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties
          if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
            echo "RELEASE_STORE_FILE=../release.keystore" >> local.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties
            echo "Keystore decoded and release config appended successfully."
          else
            echo "No RELEASE_KEYSTORE secret provided. Build will run unsigned."
          fi
        shell: bash

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --build-cache --parallel --no-daemon

      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease --build-cache --parallel --no-daemon

      - name: Print Build Outputs
        run: |
          echo "--- BUILD OUTPUTS ---"
          find app/build/outputs/ -type f \( -name "*.apk" -o -name "*.aab" \) | while read line; do
            echo "Artifact: $line (Size: $(du -sh "$line" | cut -f1))"
          done
        shell: bash

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/**/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/**/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/**/*.aab
